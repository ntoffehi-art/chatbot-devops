<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Pannes Informatiques</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <span>💬 Historique</span>
            <button class="new-chat-btn" onclick="nouvelleConversation()">+ Nouveau</button>
        </div>
        <div class="conversations" id="conversations"></div>
        <div class="sidebar-footer">
            <button class="clear-btn" onclick="effacerTout()">🗑️ Tout effacer</button>
        </div>
    </div>

    <!-- MAIN -->
    <div class="main">
        <div class="header">
            <div class="header-left">
                <button class="menu-btn" onclick="toggleSidebar()">☰</button>
                <div class="bot-avatar">🖥️</div>
                <div class="header-info">
                    <h1>TechBot</h1>
                    <span class="status"><span class="dot"></span>En ligne</span>
                </div>
            </div>
            <button class="clear-conv-btn" onclick="effacerConversation()" title="Effacer la conversation">🗑️</button>
        </div>

        <div class="messages" id="messages">
            <div class="message bot">
                <div class="avatar">🤖</div>
                <div class="msg-content">
                    <div class="bubble">
                        Bonjour ! Je suis <strong>TechBot</strong>, votre assistant pannes informatiques.<br>
                        Choisissez une catégorie ou décrivez votre problème.
                    </div>
                    <div class="categories">
                        <button class="cat-btn" onclick="envoyer('PC ne démarre pas')">💡 PC ne démarre pas</button>
                        <button class="cat-btn" onclick="envoyer('écran bleu')">🔵 Écran bleu</button>
                        <button class="cat-btn" onclick="envoyer('internet ne marche pas')">🌐 Problème Internet</button>
                        <button class="cat-btn" onclick="envoyer('PC très lent')">🐢 PC lent</button>
                        <button class="cat-btn" onclick="envoyer('virus')">🦠 Virus / Malware</button>
                        <button class="cat-btn" onclick="envoyer('clavier souris')">⌨️ Clavier / Souris</button>
                        <button class="cat-btn" onclick="envoyer('pas de son')">🔇 Problème son</button>
                        <button class="cat-btn" onclick="envoyer('imprimante')">🖨️ Imprimante</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="user-input" placeholder="Décrivez votre problème..." autocomplete="off"/>
            <button class="send-btn" onclick="envoyerMessage()">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
// ============================================================
//   1-GESTION DE L'HISTORIQUE (localStorage)
// ============================================================
// Chargement des conversations sauvegardées (ou tableau vide si aucune)
let conversations = JSON.parse(localStorage.getItem('techbot_conversations') || '[]');
let convActive = null;

function sauvegarder() {
    localStorage.setItem('techbot_conversations', JSON.stringify(conversations));
}

function getTime() {
    const now = new Date();
    return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function getDate() {
    return new Date().toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
}

function afficherSidebar() {
    const container = document.getElementById('conversations');
    container.innerHTML = '';
    if (conversations.length === 0) {
        container.innerHTML = '<div class="no-conv">Aucune conversation</div>';
        return;
    }
    [...conversations].reverse().forEach((conv, i) => {
        const realIdx = conversations.length - 1 - i;
        const div = document.createElement('div');
        div.className = 'conv-item' + (realIdx === convActive ? ' active' : '');
        div.innerHTML = `
            <div class="conv-info" onclick="chargerConversation(${realIdx})">
                <div class="conv-title">${conv.titre}</div>
                <div class="conv-date">${conv.date}</div>
            </div>
            <button class="conv-delete" onclick="supprimerConversation(${realIdx})">✕</button>`;
        container.appendChild(div);
    });
}

function chargerConversation(idx) {
    convActive = idx;
    const messages = document.getElementById('messages');
    messages.innerHTML = '';
    conversations[idx].messages.forEach(msg => {
        ajouterMessageUI(msg.texte, msg.role, msg.time, false);
    });
    afficherSidebar();
    if (window.innerWidth < 768) toggleSidebar();
}

function nouvelleConversation() {
    convActive = null;
    const messages = document.getElementById('messages');
    messages.innerHTML = `
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="msg-content">
                <div class="bubble">Bonjour ! Je suis <strong>TechBot</strong>. Comment puis-je vous aider ?</div>
                <div class="categories">
                    <button class="cat-btn" onclick="envoyer('PC ne démarre pas')">💡 PC ne démarre pas</button>
                    <button class="cat-btn" onclick="envoyer('écran bleu')">🔵 Écran bleu</button>
                    <button class="cat-btn" onclick="envoyer('internet ne marche pas')">🌐 Problème Internet</button>
                    <button class="cat-btn" onclick="envoyer('PC très lent')">🐢 PC lent</button>
                    <button class="cat-btn" onclick="envoyer('virus')">🦠 Virus / Malware</button>
                    <button class="cat-btn" onclick="envoyer('clavier souris')">⌨️ Clavier / Souris</button>
                    <button class="cat-btn" onclick="envoyer('pas de son')">🔇 Problème son</button>
                    <button class="cat-btn" onclick="envoyer('imprimante')">🖨️ Imprimante</button>
                </div>
            </div>
        </div>`;
    if (window.innerWidth < 768) toggleSidebar();
}

function effacerConversation() {
    if (convActive !== null) {
        conversations.splice(convActive, 1);
        sauvegarder();
        convActive = null;
        afficherSidebar();
    }
    nouvelleConversation();
}

function supprimerConversation(idx) {
    conversations.splice(idx, 1);
    sauvegarder();
    if (convActive === idx) { convActive = null; nouvelleConversation(); }
    else if (convActive > idx) convActive--;
    afficherSidebar();
}

function effacerTout() {
    conversations = [];
    sauvegarder();
    convActive = null;
    afficherSidebar();
    nouvelleConversation();
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

// ============================================================
//   CHAT
// ============================================================

document.getElementById("user-input").addEventListener("keydown", e => {
    if (e.key === "Enter") envoyerMessage();
});

function envoyer(texte) {
    document.getElementById("user-input").value = texte;
    envoyerMessage();
}

function ajouterMessageUI(texte, role, time, scroll = true) {
    const div = document.createElement("div");
    div.className = "message " + role;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "bot" ? "🤖" : "👤";
    const content = document.createElement("div");
    content.className = "msg-content";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = texte.replace(/\n/g, "<br>");
    const timeEl = document.createElement("div");
    timeEl.className = "time";
    timeEl.textContent = time;
    content.appendChild(bubble);
    content.appendChild(timeEl);
    div.appendChild(avatar);
    div.appendChild(content);
    messages.appendChild(div);
    if (scroll) messages.scrollTop = messages.scrollHeight;
}

function afficherTyping() {
    const messages = document.getElementById("messages");
    const div = document.createElement("div");
    div.className = "message bot";
    div.id = "typing";
    div.innerHTML = `<div class="avatar">🤖</div><div class="msg-content"><div class="bubble typing"><span></span><span></span><span></span></div></div>`;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function supprimerTyping() {
    const t = document.getElementById("typing");
    if (t) t.remove();
}

async function envoyerMessage() {
    const input = document.getElementById("user-input");
    const message = input.value.trim();
    if (!message) return;

    const time = getTime();
    ajouterMessageUI(message, "user", time);
    input.value = "";
    afficherTyping();

    try {
        const response = await fetch("/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ message })
        });
        const data = await response.json();
        supprimerTyping();
        ajouterMessageUI(data.reponse, "bot", getTime());

        // Sauvegarder dans l'historique
        if (convActive === null) {
            convActive = conversations.length;
            conversations.push({
                titre: message.substring(0, 30) + (message.length > 30 ? '...' : ''),
                date: getDate(),
                messages: []
            });
        }
        conversations[convActive].messages.push({ texte: message, role: 'user', time });
        conversations[convActive].messages.push({ texte: data.reponse, role: 'bot', time: getTime() });
        sauvegarder();
        afficherSidebar();

    } catch {
        supprimerTyping();
        ajouterMessageUI("Erreur de connexion au serveur.", "bot", getTime());
    }
}

// Init
afficherSidebar();
</script>
</body>
</html>
