<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Pannes Informatiques</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<div class="container">

    <div class="header">
        <div class="header-icon">🖥️</div>
        <div class="header-info">
            <h1>Support Technique</h1>
            <p>Assistant pannes informatiques • NLTK</p>
        </div>
        <div class="status">
            <div class="status-dot"></div>
            En ligne
        </div>
    </div>

    <div class="messages" id="messages">
        <div class="message bot">
            <div class="avatar">🤖</div>
            <div class="bubble">
                Bonjour ! Je suis votre assistant technique.<br>
                Décrivez votre panne et je vous aide à la résoudre.<br><br>
                <strong>Exemples :</strong>
                <div class="suggestions">
                    <span class="sugg" onclick="envoyer(this.textContent)">PC ne démarre pas</span>
                    <span class="sugg" onclick="envoyer(this.textContent)">Écran bleu</span>
                    <span class="sugg" onclick="envoyer(this.textContent)">Internet ne marche pas</span>
                    <span class="sugg" onclick="envoyer(this.textContent)">PC très lent</span>
                    <span class="sugg" onclick="envoyer(this.textContent)">Virus</span>
                </div>
            </div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Décrivez votre problème..." autocomplete="off" />
        <button onclick="envoyerMessage()">Envoyer ➤</button>
    </div>

</div>

<script>
    document.getElementById("user-input").addEventListener("keydown", e => {
        if (e.key === "Enter") envoyerMessage();
    });

    function envoyer(texte) {
        document.getElementById("user-input").value = texte;
        envoyerMessage();
    }

    function ajouterMessage(texte, role) {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message " + role;
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "bot" ? "🤖" : "👤";
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerHTML = texte.replace(/\n/g, "<br>");
        div.appendChild(avatar);
        div.appendChild(bubble);
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function afficherTyping() {
        const messages = document.getElementById("messages");
        const div = document.createElement("div");
        div.className = "message bot";
        div.id = "typing";
        div.innerHTML = '<div class="avatar">🤖</div><div class="bubble typing"><span></span><span></span><span></span></div>';
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
    }

    function supprimerTyping() {
        const t = document.getElementById("typing");
        if (t) t.remove();
    }

    async function envoyerMessage() {
        const input = document.getElementById("user-input");
        const message = input.value.trim();
        if (!message) return;
        ajouterMessage(message, "user");
        input.value = "";
        afficherTyping();
        try {
            const response = await fetch("/chat", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message })
            });
            const data = await response.json();
            supprimerTyping();
            ajouterMessage(data.reponse, "bot");
        } catch {
            supprimerTyping();
            ajouterMessage("Erreur de connexion au serveur.", "bot");
        }
    }
</script>
</body>
</html>
