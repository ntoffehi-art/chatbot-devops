<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Pannes Informatiques</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="app">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div class="sidebar-header">
            <h3>💬 Historique</h3>

            <button onclick="nouvelleConversation()">
                Nouveau
            </button>
        </div>

        <div id="conversations" class="conversations">
        </div>

    </div>

    <!-- MAIN -->
    <div class="main">

        <!-- HEADER -->
        <div class="header">

            <div class="logo">
                🤖 TechBot
            </div>

            <button onclick="effacerConversation()">
                🗑️
            </button>

        </div>

        <!-- MESSAGES -->
        <div id="messages" class="messages">

            <div class="message bot">
                <div class="bubble">
                    Bonjour 👋<br>
                    Décrivez votre problème informatique.
                </div>
            </div>

        </div>

        <!-- INPUT -->
        <div class="input-area">

            <input
                type="text"
                id="user-input"
                placeholder="Décrire votre problème..."
            >

            <button onclick="envoyerMessage()">
                Envoyer
            </button>

        </div>

    </div>

</div>

<script>

let conversations = JSON.parse(
    localStorage.getItem("conversations") || "[]"
);

let convActive = null;

// ===============================
// SAUVEGARDER HISTORIQUE
// ===============================
function sauvegarder() {

    localStorage.setItem(
        "conversations",
        JSON.stringify(conversations)
    );
}

// ===============================
// AFFICHER SIDEBAR
// ===============================
function afficherSidebar() {

    const container =
        document.getElementById("conversations");

    container.innerHTML = "";

    conversations.forEach((conv, index) => {

        const div = document.createElement("div");

        div.className = "conv-item";

        div.innerHTML = `
            <div onclick="chargerConversation(${index})">
                ${conv.titre}
            </div>
        `;

        container.appendChild(div);
    });
}

// ===============================
// AJOUTER MESSAGE UI
// ===============================
function ajouterMessageUI(message, role) {

    const messages =
        document.getElementById("messages");

    const div = document.createElement("div");

    div.className = "message " + role;

    div.innerHTML = `
        <div class="bubble">
            ${message}
        </div>
    `;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

// ===============================
// TYPING
// ===============================
function afficherTyping() {

    const messages =
        document.getElementById("messages");

    const div = document.createElement("div");

    div.className = "message bot";

    div.id = "typing";

    div.innerHTML = `
        <div class="bubble">
            TechBot écrit...
        </div>
    `;

    messages.appendChild(div);

    messages.scrollTop = messages.scrollHeight;
}

function supprimerTyping() {

    const typing =
        document.getElementById("typing");

    if (typing) {
        typing.remove();
    }
}

// ===============================
// ENVOYER MESSAGE
// ===============================
async function envoyerMessage() {

    const input =
        document.getElementById("user-input");

    const message = input.value.trim();

    if (!message) return;

    ajouterMessageUI(message, "user");

    input.value = "";

    afficherTyping();

    try {

        const response = await fetch("/chat", {

            method: "POST",

            headers: {
                "Content-Type": "application/json"
            },

            body: JSON.stringify({
                message: message
            })

        });

        const data = await response.json();

        supprimerTyping();

        ajouterMessageUI(data.reponse, "bot");

        // Nouvelle conversation
        if (convActive === null) {

            conversations.push({

                titre: message.substring(0, 25),

                messages: []

            });

            convActive =
                conversations.length - 1;
        }

        // Sauvegarder messages
        conversations[convActive].messages.push({
            role: "user",
            texte: message
        });

        conversations[convActive].messages.push({
            role: "bot",
            texte: data.reponse
        });

        sauvegarder();

        afficherSidebar();

    } catch (error) {

        supprimerTyping();

        ajouterMessageUI(
            "Erreur serveur.",
            "bot"
        );
    }
}

// ===============================
// CHARGER CONVERSATION
// ===============================
function chargerConversation(index) {

    convActive = index;

    const messages =
        document.getElementById("messages");

    messages.innerHTML = "";

    conversations[index].messages.forEach(msg => {

        ajouterMessageUI(
            msg.texte,
            msg.role
        );
    });
}

// ===============================
// NOUVELLE CONVERSATION
// ===============================
function nouvelleConversation() {

    convActive = null;

    document.getElementById("messages").innerHTML = `
        <div class="message bot">
            <div class="bubble">
                Bonjour 👋<br>
                Décrivez votre problème informatique.
            </div>
        </div>
    `;
}

// ===============================
// EFFACER CONVERSATION
// ===============================
function effacerConversation() {

    if (convActive !== null) {

        conversations.splice(convActive, 1);

        sauvegarder();

        afficherSidebar();

        nouvelleConversation();
    }
}

// ENTER
document
.getElementById("user-input")
.addEventListener("keydown", function(event) {

    if (event.key === "Enter") {
        envoyerMessage();
    }
});

afficherSidebar();

</script>

</body>
</html>
